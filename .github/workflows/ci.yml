name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: OTP ${{ matrix.otp }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: '27'
            rebar3: '3.24.0'
          - otp: '28'
            rebar3: '3.24.0'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: ${{ matrix.rebar3 }}

      - name: Cache deps + _build
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: ${{ runner.os }}-otp-${{ matrix.otp }}-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            ${{ runner.os }}-otp-${{ matrix.otp }}-

      - name: Drop stale project build (keep cached deps)
        # The cache key tracks only rebar.lock/rebar.config, so a deleted
        # source (e.g. a removed _SUITE) leaves an orphan .beam in the
        # cached _build that CT would still try to run. Rebuild just our
        # app and its test suites each run; cached deps are untouched.
        run: rm -rf _build/default/lib/mycelium _build/test/lib/mycelium

      - name: Start epmd
        run: epmd -daemon

      - name: Compile
        run: rebar3 compile

      - name: XRef
        run: rebar3 xref

      - name: Dialyzer
        run: rebar3 dialyzer

      - name: EUnit
        run: rebar3 eunit

      - name: Common Test
        run: rebar3 ct

      - name: Upload CT logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ct-logs-otp${{ matrix.otp }}
          path: _build/test/logs
          retention-days: 7

  bench:
    name: Bench vs baseline
    runs-on: ubuntu-24.04
    # Soft gate: don't block merge if the runner is slower than the
    # committed baseline. The script still surfaces regressions in the
    # job log; pin tighter when hardware variance settles.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24.0'

      - name: Start epmd
        run: epmd -daemon

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run bench
        run: ./bench/run.sh 1000

      - name: Compare against baseline
        run: ./bench/compare.sh 20

      - name: Upload bench artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench/results.json
          retention-days: 14
