name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: OTP ${{ matrix.otp }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: '27'
            rebar3: '3.24.0'
          - otp: '28'
            rebar3: '3.24.0'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: ${{ matrix.rebar3 }}

      - name: Cache deps + _build
        uses: actions/cache@v4
        with:
          path: |
            _build
            ~/.cache/rebar3
          key: ${{ runner.os }}-otp-${{ matrix.otp }}-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            ${{ runner.os }}-otp-${{ matrix.otp }}-

      - name: Drop stale project build (keep cached deps)
        # The cache key tracks only rebar.lock/rebar.config, so a deleted
        # source (e.g. a removed _SUITE) leaves an orphan .beam in the
        # cached _build that CT would still try to run. Rebuild just our
        # app and its test suites each run; cached deps are untouched.
        run: rm -rf _build/default/lib/mycelium _build/test/lib/mycelium

      - name: Start epmd
        run: epmd -daemon

      - name: Compile
        run: rebar3 compile

      - name: XRef
        run: rebar3 xref

      - name: Dialyzer
        run: rebar3 dialyzer

      - name: EUnit
        run: rebar3 eunit

      - name: Common Test
        # The multi-node e2e suites are timing-sensitive under CI load; a
        # different case occasionally flakes per run. Retry the full suite
        # up to 3 times (rebar3 ct --retry mis-resolves suite paths here).
        # A deterministic failure still fails on every attempt.
        run: |
          for attempt in 1 2 3; do
            if rebar3 ct; then exit 0; fi
            echo "::warning::CT attempt ${attempt} failed; retrying"
          done
          exit 1

      - name: Upload CT logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ct-logs-otp${{ matrix.otp }}
          path: _build/test/logs
          retention-days: 7

  bench:
    name: Bench vs baseline
    runs-on: ubuntu-24.04
    # Soft gate (kept as a safety net): a rare same-runner noise spike
    # should not block merge. The comparison below benchmarks the PR head
    # and the base commit on the SAME runner, so hardware variance cancels
    # and the threshold catches a genuine regression. The committed
    # bench/baseline.json is for local use only; it is machine-specific
    # and not comparable across runners.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history so the base commit can be checked out for the
          # same-runner comparison.
          fetch-depth: 0

      - name: Set up Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.24.0'

      - name: Start epmd
        run: epmd -daemon

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Bench PR head
        run: ./bench/run.sh 1000

      - name: Bench base commit on the same runner
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE" ]; then BASE="$(git rev-parse HEAD^)"; fi
          echo "Benchmarking base $BASE on this runner"
          git worktree add --detach /tmp/bench-base "$BASE"
          ( cd /tmp/bench-base && ./bench/run.sh 1000 )
          cp /tmp/bench-base/bench/results.json bench/base-results.json

      - name: Compare PR vs base (same hardware)
        run: ./bench/compare.sh 30 bench/results.json bench/base-results.json

      - name: Upload bench artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            bench/results.json
            bench/base-results.json
          retention-days: 14
